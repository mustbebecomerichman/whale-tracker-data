name: Deploy Firestore Rules

on:
  push:
    branches: [ main ]
    paths:
      - 'firestore.rules'
      - 'firebase.json'
      - '.github/workflows/deploy_firestore_rules.yml'
      - '.github/scripts/deploy-firestore-rules.js'
  workflow_dispatch:

jobs:
  deploy-firestore-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Write Firebase service account
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is required." >&2
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Validate Firebase service account
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          set -euo pipefail
          node - <<'EOF'
          const fs = require('fs');
          const path = process.env.GOOGLE_APPLICATION_CREDENTIALS;
          const raw = fs.readFileSync(path, 'utf8');
          const json = JSON.parse(raw);
          const required = ['type', 'project_id', 'client_email', 'private_key'];
          const missing = required.filter((key) => !json[key]);
          if (missing.length) {
            throw new Error(`FIREBASE_SERVICE_ACCOUNT is missing: ${missing.join(', ')}`);
          }
          if (json.project_id !== 'whaletracker-pro') {
            throw new Error(`Service account project_id must be whaletracker-pro, got ${json.project_id}`);
          }
          console.log(`Using Firebase service account ${json.client_email}`);
          console.log('This account needs roles/firebaserules.admin or an equivalent Firebase Admin role.');
          EOF

      - name: Deploy rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ runner.temp }}/firebase-service-account.json
        shell: bash
        run: |
          set -o pipefail
          if ! node .github/scripts/deploy-firestore-rules.js 2>&1 | tee firebase-deploy.log; then
            echo "::group::Firebase deploy failure"
            tail -n 80 firebase-deploy.log || true
            echo "::endgroup::"
            summary="$(tail -n 20 firebase-deploy.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')"
            echo "::error title=Firestore rules deploy failed::${summary}"
            exit 1
          fi
